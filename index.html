<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML Entity Lookup - HTML实体编码查询工具</title>
<meta name="description" content="快速查询HTML实体编码，支持符号、箭头、数学、货币、希腊字母等200+常用实体，点击即复制。">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#1a1a2e;--surface:#16213e;--card:#0f3460;--accent:#e94560;--accent2:#533483;--text:#eee;--text2:#aab;--border:#2a2a4a;--success:#00c853;--hover:#1a2a5e}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
.container{max-width:1200px;margin:0 auto;padding:20px}
header{text-align:center;padding:40px 0 30px}
header h1{font-size:2rem;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
header p{color:var(--text2);font-size:0.95rem}
.search-box{position:relative;max-width:600px;margin:0 auto 30px}
.search-box input{width:100%;padding:14px 20px 14px 48px;border:2px solid var(--border);border-radius:12px;background:var(--surface);color:var(--text);font-size:1rem;outline:none;transition:border-color .3s}
.search-box input:focus{border-color:var(--accent)}
.search-box input::placeholder{color:var(--text2)}
.search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--text2);font-size:1.2rem}
.search-box .clear-btn{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text2);font-size:1.3rem;cursor:pointer;display:none;padding:4px}
.search-box .clear-btn:hover{color:var(--text)}
.tabs{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:30px}
.tab{padding:8px 18px;border:1px solid var(--border);border-radius:20px;background:transparent;color:var(--text2);cursor:pointer;font-size:0.85rem;transition:all .3s;white-space:nowrap}
.tab:hover{border-color:var(--accent);color:var(--text)}
.tab.active{background:var(--accent);border-color:var(--accent);color:#fff}
.count{text-align:center;color:var(--text2);font-size:0.85rem;margin-bottom:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;cursor:pointer;transition:all .3s;position:relative}
.card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 4px 20px rgba(233,69,96,.15)}
.card-char{font-size:2.2rem;margin-bottom:8px;min-height:48px;display:flex;align-items:center}
.card-name{font-size:0.82rem;color:var(--accent);font-family:'SF Mono',Monaco,Consolas,monospace;margin-bottom:4px;word-break:break-all}
.card-code{font-size:0.78rem;color:var(--text2);font-family:'SF Mono',Monaco,Consolas,monospace}
.card-desc{font-size:0.78rem;color:var(--text2);margin-top:6px}
.copy-menu{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(15,52,96,.97);border-radius:10px;display:none;flex-direction:column;align-items:center;justify-content:center;gap:8px;z-index:2}
.card:hover .copy-menu{display:flex}
.copy-btn{padding:6px 16px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);font-size:0.8rem;cursor:pointer;font-family:'SF Mono',Monaco,Consolas,monospace;transition:all .2s;min-width:160px;text-align:center}
.copy-btn:hover{background:var(--accent);border-color:var(--accent);color:#fff}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--success);color:#fff;padding:10px 24px;border-radius:8px;font-size:0.9rem;transition:transform .3s;z-index:999;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
.empty{text-align:center;padding:60px 20px;color:var(--text2)}
.empty span{font-size:3rem;display:block;margin-bottom:16px}
footer{text-align:center;padding:40px 0 20px;color:var(--text2);font-size:0.8rem}
footer a{color:var(--accent);text-decoration:none}
@media(max-width:640px){
  header h1{font-size:1.5rem}
  .grid{grid-template-columns:1fr 1fr}
  .card-char{font-size:1.8rem}
  .tabs{gap:6px}
  .tab{padding:6px 12px;font-size:0.8rem}
}
@media(max-width:400px){
  .grid{grid-template-columns:1fr}
}
</style>
</head>

<footer>

const cats=['全部',...[...new Set(entities.map(e=>e.cat))]];
let activeCat='全部',query='';
const $=id=>document.getElementById(id);
const grid=$('grid'),tabsEl=$('tabs'),countEl=$('count'),emptyEl=$('empty'),searchEl=$('search'),clearBtn=$('clearBtn'),toastEl=$('toast');

function initTabs(){
  tabsEl.innerHTML=cats.map(c=>`<button class="tab${c===activeCat?' active':''}" data-cat="${c}">${c}</button>`).join('');
  tabsEl.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{activeCat=t.dataset.cat;tabsEl.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));t.classList.add('active');render()});
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function render(){
  const q=query.toLowerCase();
  const filtered=entities.filter(e=>{
    if(activeCat!=='全部'&&e.cat!==activeCat)return false;
    if(!q)return true;
    return e.char.toLowerCase().includes(q)||e.name.toLowerCase().includes(q)||e.code.toLowerCase().includes(q)||e.desc.toLowerCase().includes(q);
  });
  countEl.textContent=`显示 ${filtered.length} / ${entities.length} 个实体`;
  if(!filtered.length){grid.innerHTML='';emptyEl.style.display='block';return}
  emptyEl.style.display='none';
  grid.innerHTML=filtered.map(e=>`<div class="card">
    <div class="card-char">${e.char==='&'?'&amp;':e.char==='<'?'&lt;':e.char==='>'?'&gt;':e.char===' '?'<span style="opacity:.3">[space]</span>':e.char}</div>
    <div class="card-name">${escHtml(e.name)}</div>
    <div class="card-code">${escHtml(e.code)}</div>
    <div class="card-desc">${e.desc} · ${e.cat}</div>
    <div class="copy-menu">
      <button class="copy-btn" onclick="copyText('${escHtml(e.name)}',event)">复制 ${escHtml(e.name)}</button>
      <button class="copy-btn" onclick="copyText('${escHtml(e.code)}',event)">复制 ${escHtml(e.code)}</button>
      <button class="copy-btn" onclick="copyText('${e.char.replace(/'/g,"\\'")}',event)">复制字符 ${e.char==='&'?'&amp;':e.char==='<'?'&lt;':e.char==='>'?'&gt;':e.char===' '?'⎵':e.char}</button>
    </div>
  </div>`).join('');
}

function copyText(text,e){
  e&&e.stopPropagation();
  navigator.clipboard.writeText(text).then(()=>showToast('已复制: '+text)).catch(()=>{
    const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('已复制: '+text);
  });
}

let toastTimer;
function showToast(msg){
  toastEl.textContent=msg;toastEl.classList.add('show');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>toastEl.classList.remove('show'),1800);
}

function clearSearch(){searchEl.value='';query='';clearBtn.style.display='none';render();searchEl.focus()}

searchEl.addEventListener('input',e=>{query=e.target.value.trim();clearBtn.style.display=query?'block':'none';render()});

initTabs();render();
</script>
